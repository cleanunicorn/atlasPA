<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas — Personal AI Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3e;
    --accent: #6c63ff;
    --accent-dim: #4e47cc;
    --text: #e2e2f0;
    --text-dim: #8888aa;
    --user-bg: #2a2440;
    --agent-bg: #1e2235;
    --error: #ff6b6b;
    --radius: 12px;
    --font: system-ui, -apple-system, sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

  #app {
    display: flex; flex-direction: column; height: 100vh; max-width: 860px;
    margin: 0 auto;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .02em; }
  header span { font-size: .8rem; color: var(--text-dim); }

  #status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #555; margin-right: 8px; transition: background .3s;
  }
  #status-dot.connected { background: #4caf50; }

  #messages {
    flex: 1; overflow-y: auto; padding: 24px 20px; display: flex;
    flex-direction: column; gap: 16px;
  }

  .msg { display: flex; flex-direction: column; max-width: 80%; gap: 4px; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px; border-radius: var(--radius); line-height: 1.55;
    white-space: pre-wrap; word-break: break-word; font-size: .95rem;
  }
  .msg.user  .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; }
  .msg.agent .bubble { background: var(--agent-bg); border-bottom-left-radius: 4px; }
  .msg.error .bubble { background: #2a1010; color: var(--error); }

  .label { font-size: .72rem; color: var(--text-dim); padding: 0 4px; }

  .file-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--border); border-radius: 8px; padding: 6px 12px;
    text-decoration: none; color: var(--text); font-size: .85rem;
    transition: background .2s;
  }
  .file-link:hover { background: #383b55; }
  .file-link img { max-width: 240px; max-height: 180px; border-radius: 6px; display: block; }

  #typing {
    padding: 0 20px 12px; color: var(--text-dim); font-size: .82rem;
    min-height: 24px; display: none;
  }

  #input-row {
    display: flex; gap: 8px; padding: 14px 20px;
    border-top: 1px solid var(--border); background: var(--surface);
  }

  #msg-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; color: var(--text);
    font-family: var(--font); font-size: .95rem; resize: none; outline: none;
    max-height: 160px; line-height: 1.5;
  }
  #msg-input:focus { border-color: var(--accent); }

  #send-btn, #mic-btn {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 10px 18px; font-size: .95rem; font-weight: 600; cursor: pointer;
    transition: background .2s; align-self: flex-end;
  }
  #send-btn:hover:not(:disabled), #mic-btn:hover:not(:disabled) { background: var(--accent-dim); }
  #send-btn:disabled, #mic-btn:disabled { opacity: .5; cursor: default; }
  #mic-btn.recording { background: var(--error); }
  #mic-btn.recording:hover { background: #e55; }

  #hint { font-size: .72rem; color: var(--text-dim); padding: 4px 20px 10px; }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span id="status-dot"></span>Atlas</h1>
    <span id="session-label"></span>
  </header>

  <div id="messages"></div>
  <div id="typing">Atlas is thinking…</div>

  <div id="input-row">
    <textarea id="msg-input" rows="1" placeholder="Send a message…"></textarea>
    <button id="mic-btn" title="Record voice message">🎤</button>
    <button id="send-btn">Send</button>
  </div>
  <div id="hint">Enter to send · Shift+Enter for new line · 🎤 to record voice · /clear to reset history</div>
</div>

<script>
// ── Session ID ─────────────────────────────────────────────────────────────
let sessionId = sessionStorage.getItem('atlas_sid');
if (!sessionId) {
  sessionId = crypto.randomUUID();
  sessionStorage.setItem('atlas_sid', sessionId);
}
document.getElementById('session-label').textContent = 'session ' + sessionId.slice(0, 8);

// ── WebSocket ──────────────────────────────────────────────────────────────
const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const wsUrl = `${protocol}//${location.host}/ws/${sessionId}`;
let ws;
const statusDot = document.getElementById('status-dot');
const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

function connect() {
  ws = new WebSocket(wsUrl);

  ws.addEventListener('open', () => {
    statusDot.classList.add('connected');
    sendBtn.disabled = false;
  });

  ws.addEventListener('close', () => {
    statusDot.classList.remove('connected');
    sendBtn.disabled = true;
    setTimeout(connect, 2000);
  });

  ws.addEventListener('message', (ev) => {
    const data = JSON.parse(ev.data);

    if (data.type === 'status') {
      typingEl.textContent = data.content;
      typingEl.style.display = 'block';
      return;
    }

    typingEl.style.display = 'none';
    typingEl.textContent = 'Atlas is thinking\u2026';
    sendBtn.disabled = false;

    if (data.type === 'text') {
      addBubble('agent', data.content);
    } else if (data.type === 'transcript') {
      addBubble('user', '🎤 ' + data.content);
    } else if (data.type === 'file') {
      addFile(data.name, data.url, data.caption || '');
    } else if (data.type === 'error') {
      addBubble('error', '⚠️ ' + data.content);
    }
  });
}

connect();

// ── Rendering ──────────────────────────────────────────────────────────────
function addBubble(role, text) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'You' : 'Atlas';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  if (role === 'user') {
    msg.append(bubble, label);
  } else {
    msg.append(label, bubble);
  }

  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addFile(name, url, caption) {
  const msg = document.createElement('div');
  msg.className = 'msg agent';

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'Atlas';

  const link = document.createElement('a');
  link.className = 'file-link';
  link.href = url;
  link.target = '_blank';

  const isImage = /\.(png|jpe?g|gif|webp|bmp)$/i.test(name);
  if (isImage) {
    const img = document.createElement('img');
    img.src = url;
    img.alt = caption || name;
    link.appendChild(img);
  } else {
    link.textContent = '📎 ' + (caption || name);
  }

  msg.append(label, link);
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── Sending ────────────────────────────────────────────────────────────────
function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  addBubble('user', text);
  ws.send(JSON.stringify({ message: text }));

  inputEl.value = '';
  inputEl.style.height = 'auto';
  typingEl.style.display = 'block';
  sendBtn.disabled = true;
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

sendBtn.addEventListener('click', sendMessage);

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-grow textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

// ── Microphone recording ────────────────────────────────────────────────
const micBtn = document.getElementById('mic-btn');
let mediaRecorder = null;
let audioChunks = [];

micBtn.addEventListener('click', async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    // Stop recording
    mediaRecorder.stop();
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.addEventListener('dataavailable', (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    });

    mediaRecorder.addEventListener('stop', async () => {
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
      stream.getTracks().forEach(t => t.stop());

      if (!audioChunks.length) return;

      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
      const ext = mediaRecorder.mimeType.includes('webm') ? 'webm'
               : mediaRecorder.mimeType.includes('ogg')  ? 'ogg'
               : mediaRecorder.mimeType.includes('mp4')  ? 'mp4'
               : 'webm';

      // Convert to base64 and send via WebSocket
      const reader = new FileReader();
      reader.onloadend = () => {
        const b64 = reader.result.split(',')[1];
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'audio',
            data: b64,
            filename: `recording.${ext}`,
          }));
          typingEl.style.display = 'block';
          sendBtn.disabled = true;
        }
      };
      reader.readAsDataURL(blob);
    });

    mediaRecorder.start();
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹';
  } catch (err) {
    addBubble('error', '⚠️ Microphone access denied or unavailable.');
  }
});
</script>
</body>
</html>
